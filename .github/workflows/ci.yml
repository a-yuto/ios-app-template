name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: ios-app-template
  PROJECT: ios-app-template.xcodeproj

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict --reporter github-actions-logging

  test:
    name: Build & Test (Unit + UI)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Install xcbeautify
        run: brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

      - name: Show Xcode and SDK info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available | grep -E "iPhone" | head -10

      - name: Pick iPhone simulator
        id: sim
        run: |
          # 新しめのモデルを優先 (A15 以前の SE 系は XCUITest が不安定なため避ける)
          PREFERRED=(
            "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone 17" "iPhone 17e"
            "iPhone Air"
            "iPhone 16 Pro Max" "iPhone 16 Pro" "iPhone 16 Plus" "iPhone 16"
            "iPhone 15 Pro Max" "iPhone 15 Pro" "iPhone 15 Plus" "iPhone 15"
          )
          UDID=""
          for name in "${PREFERRED[@]}"; do
            UDID=$(xcrun simctl list devices available --json \
              | jq -r --arg name "$name" '
                [ .devices
                  | to_entries[]
                  | select(.key | test("com.apple.CoreSimulator.SimRuntime.iOS"))
                  | .value[]
                  | select(.isAvailable == true)
                  | select(.name == $name)
                ] | first | (.udid // empty)')
            if [ -n "$UDID" ]; then
              echo "Selected: $name ($UDID)"
              break
            fi
          done
          if [ -z "$UDID" ]; then
            # フォールバック: 任意の iPhone (SE 含む)
            UDID=$(xcrun simctl list devices available --json \
              | jq -r '
                [ .devices
                  | to_entries[]
                  | select(.key | test("com.apple.CoreSimulator.SimRuntime.iOS"))
                  | .value[]
                  | select(.isAvailable == true)
                  | select(.name | startswith("iPhone"))
                ] | first | (.udid // empty)')
            if [ -z "$UDID" ]; then
              echo "No iPhone simulator available" >&2
              exit 1
            fi
            echo "Fallback simulator UDID: $UDID"
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -only-testing:ios-app-templateTests \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | xcbeautify

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -only-testing:ios-app-templateUITests \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | xcbeautify
