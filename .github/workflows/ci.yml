name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: ios-app-template
  PROJECT: ios-app-template.xcodeproj

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict --reporter github-actions-logging

  test:
    name: Build & Test (Unit + UI)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Install xcbeautify
        run: brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

      - name: Show Xcode and SDK info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available | grep -E "iPhone" | head -10

      - name: Pick iPhone simulator
        id: sim
        run: |
          UDID=$(./scripts/pick-simulator.sh)
          echo "Selected simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      # bootstatus -b は共有ランナーでブートが進まないと永久に返ってこず、
      # ジョブ全体の timeout-minutes を使い切る (niki-sandbox#94)。
      # ポーリング + ステップ単位の backstop に置き換え、Booted にならなくても
      # 失敗にせず続行する (xcodebuild は自力でブートできるため非致命)。
      - name: Boot simulator
        timeout-minutes: 8
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          for i in $(seq 1 60); do
            STATE=$(xcrun simctl list devices --json \
              | jq -r --arg u "$UDID" '.devices[][] | select(.udid == $u) | .state')
            echo "[$i/60] state=$STATE"
            [ "$STATE" = "Booted" ] && exit 0
            sleep 5
          done
          echo "::warning::Simulator did not reach Booted within 5min; continuing (xcodebuild will boot it)"

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | xcbeautify

      # xcodebuild test 自体が共有ランナー上でサイレントにハングすることがある
      # (実例: destination 警告を出した後41分無出力)。ジョブ全体の 45 分を
      # 溶かさないよう、ステップ単位で打ち切って再実行を安くする (niki-sandbox#94 と同じ思想)
      - name: Run unit tests
        timeout-minutes: 15
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -only-testing:ios-app-templateTests \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | xcbeautify

      # 共有ランナーは遅く、ローカルでパスする UI テストが waitForExistence の
      # タイムアウトでフレークする (niki-sandbox#95)。失敗したテストだけ最大3回
      # 再試行する。Unit テストは安定しているのでリトライ不要。
      - name: Run UI tests
        timeout-minutes: 20
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -only-testing:ios-app-templateUITests \
            -retry-tests-on-failure \
            -test-iterations 3 \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | xcbeautify
