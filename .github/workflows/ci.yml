name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: ios-app-template
  PROJECT: ios-app-template.xcodeproj

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Unit Test
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

      - name: Show Xcode and SDK info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available | grep -E "iPhone" | head -10

      - name: Pick iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '
              [ .devices
                | to_entries[]
                | select(.key | test("com.apple.CoreSimulator.SimRuntime.iOS"))
                | .value[]
                | select(.isAvailable == true)
                | select(.name | test("^iPhone"))
              ]
              | sort_by(.name) | reverse | .[0].udid')
          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            echo "No iPhone simulator available" >&2
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator UDID: $UDID"

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -only-testing:ios-app-templateTests \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building | xcbeautify

  ui-test:
    name: UI / E2E Test
    runs-on: macos-15
    needs: build-and-test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

      - name: Pick iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '
              [ .devices
                | to_entries[]
                | select(.key | test("com.apple.CoreSimulator.SimRuntime.iOS"))
                | .value[]
                | select(.isAvailable == true)
                | select(.name | test("^iPhone"))
              ]
              | sort_by(.name) | reverse | .[0].udid')
          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            echo "No iPhone simulator available" >&2
            exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            -only-testing:ios-app-templateUITests \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify
